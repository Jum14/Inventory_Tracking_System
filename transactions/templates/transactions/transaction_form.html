{% extends 'base.html' %}

{% block content %}
<div class="row mt-4">
    <div class="col-md-6 mx-auto">
        <div class="card shadow-sm">
            <div class="card-header bg-dark text-white">
                <h4 class="mb-0">Record Stock Movement</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <hr>
                    <button type="submit" class="btn btn-primary w-100">Save Transaction</button>
                    <a href="{% url 'transaction_list' %}" class="btn btn-link w-100 mt-2 text-decoration-none">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
