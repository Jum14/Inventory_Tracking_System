{% extends 'base.html' %}

{% block content %}
<div class="row mt-5">
    <div class="col-md-6 offset-md-3">
        <div class="card border-danger shadow">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0">Confirm Deletion</h4>
            </div>
            <div class="card-body text-center">
                <h5 class="card-title mt-3">Are you sure you want to delete this product?</h5>
                <p class="card-text text-muted fs-4">"{{ product.name }}"</p>
                <div class="alert alert-warning">
                    <strong>Warning:</strong> This action cannot be undone!
                </div>
                
                <form method="POST" class="mt-4">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger btn-lg px-4">Yes, Delete</button>
                    <a href="{% url 'product_list' %}" class="btn btn-secondary btn-lg px-4 ms-2">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
