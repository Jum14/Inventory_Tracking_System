{% for p in products %}
<tr>
    <td class="ps-3">
        <div class="fw-bold">{{ p.name }}</div>
        <small class="text-muted font-monospace">{{ p.sku }}</small>
    </td>
    <td>
        {% if p.category %}
        <span class="badge bg-{{ p.category.color_theme }} bg-opacity-10 text-{{ p.category.color_theme }} border border-{{ p.category.color_theme }}">
            <i class="bi {{ p.category.icon }}"></i> {{ p.category.name }}
        </span>
        {% else %}
        <span class="badge bg-secondary">Uncategorized</span>
        {% endif %}
    </td>
    <td>
        <div class="d-flex align-items-center">
            <span class="fw-bold me-2">{{ p.current_stock }}</span>
            {% if p.is_low_stock %}
            <span class="badge bg-danger pulse-animation" title="Low Stock Warning">
                <i class="bi bi-exclamation-triangle-fill"></i> LOW
            </span>
            {% endif %}
        </div>
    </td>
    <td>${{ p.unit_price }}</td>
    <td class="text-center">
        <a href="{% url 'product_update' p.id %}" class="btn btn-sm btn-outline-primary shadow-sm"><i class="bi bi-pencil"></i></a>
        <a href="{% url 'product_detail' p.id %}" class="btn btn-sm btn-outline-info shadow-sm"><i class="bi bi-eye"></i></a>
    </td>
</tr>
{% empty %}
<tr>
    <td colspan="5" class="text-center py-5">
        <i class="bi bi-search fs-2 text-muted d-block mb-2"></i>
        <p class="text-muted">No products found matching those criteria.</p>
    </td>
</tr>
{% endfor %}
