{% extends 'base.html' %}

{% block content %}
<div class="row mt-4">
    <div class="col-md-8 mx-auto">
        <div class="card shadow-sm">
            <div class="card-header bg-info text-white d-flex justify-content-between align-items-center">
                <h4 class="mb-0">Supplier Details</h4>
                <span class="badge bg-light text-dark">ID: #{{ supplier.id }}</span>
            </div>
            <div class="card-body">
                <h2 class="card-title fw-bold text-primary">{{ supplier.company_name }}</h2>
                <hr>
                <div class="row mb-3">
                    <div class="col-sm-4 fw-bold">Contact Person:</div>
                    <div class="col-sm-8">{{ supplier.contact_person }}</div>
                </div>
                <div class="row mb-3">
                    <div class="col-sm-4 fw-bold">Email:</div>
                    <div class="col-sm-8">{{ supplier.email }}</div>
                </div>
                <div class="row mb-3">
                    <div class="col-sm-4 fw-bold">Phone:</div>
                    <div class="col-sm-8">{{ supplier.phone_number }}</div>
                </div>
                <div class="row mb-3">
                    <div class="col-sm-4 fw-bold">Address:</div>
                    <div class="col-sm-8">{{ supplier.address }}</div>
                </div>
                
                <div class="mt-4">
                    <a href="{% url 'supplier_list' %}" class="btn btn-secondary">Back to List</a>
                    <a href="{% url 'supplier_update' supplier.id %}" class="btn btn-warning">Edit</a>
                    <a href="{% url 'supplier_delete' supplier.id %}" class="btn btn-danger">Delete</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
