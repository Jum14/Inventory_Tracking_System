{% extends 'base.html' %}

{% block content %}
<div class="row mt-4">
    <div class="col-md-6 mx-auto">
        <div class="card shadow-sm border-danger">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0">Delete Supplier?</h4>
            </div>
            <div class="card-body">
                <p>Are you sure you want to delete the supplier <strong>{{ supplier.company_name }}</strong>?</p>
                <p class="text-muted small">Warning: This action cannot be undone.</p>
                
                <form method="POST">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Yes, Delete</button>
                    <a href="{% url 'supplier_list' %}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
